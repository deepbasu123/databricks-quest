schema_version: "1.0"

pack:
  slug: lakehouse-foundations
  title: "Lakehouse Foundations"
  version: "1.1.0"
  description: >
    An entry-level GameDay that takes teams through the core lakehouse loop:
    govern a schema, ingest data into Delta, enforce quality, curate a silver
    table, and serve a gold aggregate through a published dashboard. Runs on a
    serverless SQL warehouse with per-team Unity Catalog schemas provisioned by
    the host (PR08 resource bootstrap).
  audience: ["new-hires", "customer-workshops", "enablement"]
  duration_minutes: 90
  difficulty: easy
  owner: field-enablement

scenario:
  setup: >
    Your team has a raw events drop and an empty governed schema
    (${team_catalog}.${team_schema}). Build the medallion loop — bronze to
    silver — with quality you can prove.

learning_objectives:
  - "Work inside a governed Unity Catalog namespace."
  - "Ingest into a Delta table and validate row counts."
  - "Enforce a data-quality rule and prove it holds."
  - "Curate a silver table ready for consumption."
  - "Serve a gold aggregate through a published AI/BI dashboard."

capabilities_required:
  - "Serverless SQL warehouse"
  - "Unity Catalog schema per team"
  - "Delta tables"
  - "AI/BI dashboards"

# Deterministic generated feed (no rand()) so validator thresholds are stable
# across bootstraps: 500 events, ~100 purchases, with deliberately dirty rows
# (NULL user_ids, negative purchase values) that the quality gate must catch.
resources:
  seed_sql:
    - >
      CREATE OR REPLACE TABLE ${team_catalog}.${team_schema}.bronze_events AS
      SELECT
        CAST(id AS INT) AS event_id,
        CASE WHEN id % 19 = 0 THEN NULL ELSE CAST(10 + id % 40 AS INT) END AS user_id,
        CASE
          WHEN id % 5 = 0 THEN 'purchase'
          WHEN id % 7 = 0 THEN 'refund'
          ELSE 'view'
        END AS event_type,
        CASE
          WHEN id % 5 = 0 THEN
            CASE WHEN id % 45 = 0 THEN -9.99 ELSE CAST(id % 50 AS DOUBLE) + 0.99 END
          WHEN id % 7 = 0 THEN -1.0 * (CAST(id % 30 AS DOUBLE) + 0.50)
          ELSE 0.0
        END AS value,
        date_add(current_date(), -CAST(id % 14 AS INT)) AS event_date
      FROM range(500)

scoring_defaults:
  base_points: 100
  first_blood_bonus: 20

quests:
  - slug: govern
    title: "Govern your namespace"
    category: governance
    difficulty: easy
    base_points: 100
    sort_order: 1
    narrative_md: >
      Every good lakehouse starts with a governed home. Confirm your team's
      schema and bronze landing zone are ready.
    facilitator_notes: >
      The connectivity check is warehouse-independent. The bronze check depends
      on host bootstrap having run for the event.
    tasks:
      - slug: connectivity-check
        title: "Confirm warehouse connectivity"
        objective: "Prove your team can run SQL on the event warehouse."
        instructions_md: "Run the warm-up check to confirm connectivity."
        success_criteria_md: "A trivial query returns 1."
        points: 25
        validation_mode: auto
        validators:
          - id: connectivity
            type: sql_assertion
            mode: sync
            statement: "SELECT 1"
            expect:
              operator: "="
              value: 1
        hints:
          - title: "Stuck?"
            body_md: "Confirm the event warehouse with your host."
            penalty_points: -5
        solutions:
          - skip: "Validator is self-contained (SELECT 1); no setup action needed."
      - slug: bronze-ready
        title: "Verify the bronze landing zone"
        objective: "Confirm bronze_events landed in your schema."
        instructions_md: >
          Your team owns `${team_catalog}.${team_schema}`. Verify the bronze feed
          is present.
        success_criteria_md: "bronze_events has at least 400 rows."
        points: 75
        validation_mode: auto
        validators:
          - id: bronze-rows
            type: sql_assertion
            mode: sync
            statement: "SELECT count(*) FROM ${team_catalog}.${team_schema}.bronze_events"
            expect:
              operator: ">="
              value: 400
        hints:
          - title: "No data?"
            body_md: "Ask the host to run resource bootstrap."
            penalty_points: -10
        solutions:
          - skip: "bronze_events is created by host bootstrap (resources.seed_sql)."

  - slug: refine
    title: "Refine to silver"
    category: modeling
    difficulty: intermediate
    base_points: 200
    sort_order: 2
    unlock_rule:
      type: quest_completed
      quest_slug: govern
    narrative_md: >
      Promote clean, purchase-only events into a silver table the rest of the
      org can trust.
    facilitator_notes: >
      Teams create `silver_purchases` in their own schema containing only clean
      purchase events. The bronze feed deliberately contains NULL user_ids and
      negative purchase values — the quality gate must catch both. Validators
      read only from the team schema.
    tasks:
      - slug: build-silver
        title: "Create silver_purchases"
        objective: "Curate clean purchase events into a silver table."
        instructions_md: >
          Create `${team_catalog}.${team_schema}.silver_purchases` containing only
          rows where event_type = 'purchase'. The raw feed is dirty — keep only
          rows with a known user (`user_id IS NOT NULL`) and a positive `value`.
        success_criteria_md: "silver_purchases exists with the clean purchase rows."
        points: 100
        validation_mode: auto
        validators:
          - id: silver-count
            type: sql_assertion
            mode: sync
            statement: "SELECT count(*) FROM ${team_catalog}.${team_schema}.silver_purchases"
            expect:
              operator: ">="
              value: 50
        hints:
          - title: "Filter"
            body_md: "WHERE event_type = 'purchase' AND user_id IS NOT NULL AND value > 0."
            penalty_points: -10
        solutions:
          - sql: >
              CREATE OR REPLACE TABLE ${team_catalog}.${team_schema}.silver_purchases AS
              SELECT * FROM ${team_catalog}.${team_schema}.bronze_events
              WHERE event_type = 'purchase' AND user_id IS NOT NULL AND value > 0
      - slug: quality-gate
        title: "Prove the quality rule"
        objective: "Silver must contain only clean purchases."
        instructions_md: >
          Your silver table must contain zero non-purchase rows, zero rows with a
          NULL user_id, and zero rows with a non-positive value.
        success_criteria_md: "No dirty rows survive in silver_purchases."
        points: 100
        validation_mode: auto
        validators:
          - id: no-non-purchases
            type: sql_assertion
            mode: sync
            statement: >
              SELECT count(*) FROM ${team_catalog}.${team_schema}.silver_purchases
              WHERE event_type <> 'purchase'
            expect:
              operator: "="
              value: 0
          - id: no-dirty-rows
            type: sql_assertion
            mode: sync
            statement: >
              SELECT count(*) FROM ${team_catalog}.${team_schema}.silver_purchases
              WHERE user_id IS NULL OR value <= 0
            expect:
              operator: "="
              value: 0
        hints:
          - title: "Leaking rows?"
            body_md: >
              Rebuild silver from bronze with all three predicates applied:
              purchase events, non-NULL user_id, positive value.
            penalty_points: -15
        solutions:
          - skip: "Proven by the build-silver solution's filters."

  - slug: prove-it
    title: "Prove the outcome"
    category: outcome
    difficulty: intermediate
    base_points: 150
    sort_order: 3
    unlock_rule:
      type: quest_completed
      quest_slug: refine
    narrative_md: >
      Show the business value: total purchase revenue, and a walkthrough of your
      medallion design.
    facilitator_notes: >
      The revenue check is automated; the design walkthrough is host-reviewed.
      The table_exists SDK check auto-grades when the workspace client can run
      and degrades to host review when it can't.
    tasks:
      - slug: revenue-total
        title: "Compute purchase revenue"
        objective: "Sum the value of all purchases."
        instructions_md: >
          The total `value` across silver_purchases must be greater than zero.
        success_criteria_md: "Purchase revenue is positive."
        points: 75
        validation_mode: auto
        validators:
          - id: revenue-positive
            type: sql_assertion
            mode: sync
            statement: "SELECT sum(value) FROM ${team_catalog}.${team_schema}.silver_purchases"
            expect:
              operator: ">"
              value: 0
        hints:
          - title: "Hint"
            body_md: "SUM(value) over the silver table."
            penalty_points: -5
        solutions:
          - skip: "Follows from the build-silver solution (positive values only)."
      - slug: design-review
        title: "Walk the host through your design"
        objective: "Explain your bronze→silver design and quality rule."
        instructions_md: >
          Walk your host through the medallion design and how you proved quality.
        success_criteria_md: "Host approves the design walkthrough."
        points: 75
        validation_mode: manual
        manual_validation_required: true
        validators:
          - id: silver-table-exists
            type: databricks_sdk
            mode: sync
            check: table_exists
            params:
              table: "${team_catalog}.${team_schema}.silver_purchases"
          - id: host-confirm-design
            type: manual
            mode: sync
        hints:
          - title: "Talking points"
            body_md: "Cover ingestion, the quality gate, and lineage."
            penalty_points: -5
        solutions:
          - skip: >
              silver_purchases exists from the build-silver solution (satisfies
              table_exists); the walkthrough itself is host review.

  - slug: serve-gold
    title: "Serve the business"
    category: presentation
    difficulty: intermediate
    base_points: 200
    sort_order: 4
    unlock_rule:
      type: quest_completed
      quest_slug: prove-it
    narrative_md: >
      The pipeline works — now make it useful. Aggregate silver into a gold
      table and put a published dashboard in front of it, so a business user
      sees revenue without writing a line of SQL.
    facilitator_notes: >
      The gold reconciliation is fully automated. The dashboard task pairs the
      dashboard_published SDK check with host review; teams must include their
      team slug in the dashboard name so the check can find it — say this out
      loud at kickoff.
    tasks:
      - slug: gold-daily-revenue
        title: "Create gold_daily_revenue"
        objective: "Aggregate clean purchases into daily revenue."
        instructions_md: >
          Create `${team_catalog}.${team_schema}.gold_daily_revenue` with one row
          per `event_date` and a `revenue` column summing silver purchase values.
          The gold total must reconcile exactly with silver.
        success_criteria_md: "gold_daily_revenue reconciles with silver_purchases."
        points: 100
        validation_mode: auto
        validators:
          - id: gold-reconciles
            type: sql_assertion
            mode: sync
            statement: >
              SELECT
                (SELECT round(sum(revenue),2) FROM ${team_catalog}.${team_schema}.gold_daily_revenue)
                = (SELECT round(sum(value),2) FROM ${team_catalog}.${team_schema}.silver_purchases)
            expect:
              operator: is_true
          - id: gold-grain
            type: sql_assertion
            mode: sync
            statement: >
              SELECT count(*) = count(DISTINCT event_date)
              FROM ${team_catalog}.${team_schema}.gold_daily_revenue
            expect:
              operator: is_true
        hints:
          - title: "Pattern"
            body_md: "GROUP BY event_date and SUM(value) AS revenue."
            penalty_points: -10
        solutions:
          - sql: >
              CREATE OR REPLACE TABLE ${team_catalog}.${team_schema}.gold_daily_revenue AS
              SELECT event_date, sum(value) AS revenue
              FROM ${team_catalog}.${team_schema}.silver_purchases
              GROUP BY event_date
      - slug: first-dashboard
        title: "Publish your first dashboard"
        objective: "Publish an AI/BI dashboard over gold_daily_revenue."
        instructions_md: >
          Build an AI/BI dashboard with at least one chart of daily revenue from
          your gold table, include your team name (`${team_slug}`) in the
          dashboard title, and publish it. Share the link with your host.
        success_criteria_md: "A published dashboard named for your team exists."
        points: 100
        validation_mode: manual
        manual_validation_required: true
        validators:
          - id: dashboard-published
            type: databricks_sdk
            mode: sync
            check: dashboard_published
            params:
              name_contains: "${team_slug}"
          - id: host-confirm-dashboard
            type: manual
            mode: sync
        hints:
          - title: "Where to start"
            body_md: >
              Open your gold table's query result in the SQL editor and use the
              'Create dashboard' action, then Publish.
            penalty_points: -10
        solutions:
          - workspace_op:
              op: publish_dashboard
              name: "${team_slug} daily revenue"
              dataset_sql: "SELECT * FROM ${team_catalog}.${team_schema}.gold_daily_revenue"
