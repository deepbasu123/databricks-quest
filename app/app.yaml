# real Lakebase endpoint, warehouse id, catalog/schema, and backend default for
# the target workspace. Committed without environment values so a fresh deploy
# never boots against another workspace's endpoints.
command:
  - uvicorn
  - main:app
  - --host
  - 0.0.0.0
  - --port
  - "8000"
